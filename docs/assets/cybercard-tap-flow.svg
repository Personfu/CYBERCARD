<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 540" role="img" aria-label="CyberCard tap-to-revenue sequence">
  <title>CyberCard — Tap-to-Revenue Sequence</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#0a0a0c"/><stop offset="1" stop-color="#111114"/></linearGradient>
    <pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse"><path d="M24 0H0V24" fill="none" stroke="rgba(0,229,200,0.05)" stroke-width="0.5"/></pattern>
    <marker id="ar1" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 Z" fill="#00e5c8"/></marker>
    <marker id="arG" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 Z" fill="#c9a84c"/></marker>
  </defs>
  <style>
    .lane { stroke: rgba(255,255,255,0.08); stroke-width: 1; stroke-dasharray: 2 4; }
    .actor { fill: rgba(0,229,200,0.06); stroke: rgba(0,229,200,0.55); }
    .h { font: 700 11px ui-monospace, Consolas, monospace; letter-spacing: 3px; fill: #f5f5f7; }
    .s { font: 9px ui-monospace, Consolas, monospace; letter-spacing: 2px; fill: #9da0a8; }
    .t { font: 9px ui-monospace, Consolas, monospace; letter-spacing: 2px; fill: #00e5c8; }
    .g { font: 9px ui-monospace, Consolas, monospace; letter-spacing: 2px; fill: #c9a84c; }
    .arrow { stroke: #00e5c8; stroke-width: 1.4; fill: none; }
    .arrowG { stroke: #c9a84c; stroke-width: 1.4; fill: none; }
  </style>
  <rect width="1100" height="540" fill="url(#bg)"/>
  <rect width="1100" height="540" fill="url(#grid)"/>

  <g font-family="ui-monospace, Consolas, monospace" font-size="10" letter-spacing="3" fill="#6b6b72">
    <text x="40" y="38">PERSONFU // FLLC.NET</text>
    <text x="1060" y="38" text-anchor="end">CYBERCARD / TAP_FLOW_v1</text>
  </g>
  <text x="40" y="76" font-family="ui-monospace, Consolas, monospace" font-size="20" letter-spacing="6" fill="#f5f5f7">TAP-TO-REVENUE — END-TO-END SEQUENCE (≤ 600 MS BUDGET)</text>

  <!-- Lanes -->
  <g transform="translate(0 120)">
    <g>
      <rect x="60" y="0" width="160" height="36" rx="4" class="actor"/><text x="140" y="22" class="h" text-anchor="middle">PHONE / READER</text>
      <line x1="140" y1="36" x2="140" y2="380" class="lane"/>
    </g>
    <g>
      <rect x="240" y="0" width="160" height="36" rx="4" class="actor"/><text x="320" y="22" class="h" text-anchor="middle">CYBERCARD</text>
      <line x1="320" y1="36" x2="320" y2="380" class="lane"/>
    </g>
    <g>
      <rect x="420" y="0" width="160" height="36" rx="4" class="actor"/><text x="500" y="22" class="h" text-anchor="middle">FLLC.NET /TAP</text>
      <line x1="500" y1="36" x2="500" y2="380" class="lane"/>
    </g>
    <g>
      <rect x="600" y="0" width="160" height="36" rx="4" class="actor"/><text x="680" y="22" class="h" text-anchor="middle">/API/TAP</text>
      <line x1="680" y1="36" x2="680" y2="380" class="lane"/>
    </g>
    <g>
      <rect x="780" y="0" width="160" height="36" rx="4" class="actor"/><text x="860" y="22" class="h" text-anchor="middle">SUPABASE / RESEND</text>
      <line x1="860" y1="36" x2="860" y2="380" class="lane"/>
    </g>
    <g>
      <rect x="960" y="0" width="100" height="36" rx="4" class="actor"/><text x="1010" y="22" class="h" text-anchor="middle">OWNER</text>
      <line x1="1010" y1="36" x2="1010" y2="380" class="lane"/>
    </g>
  </g>

  <!-- Steps -->
  <g transform="translate(0 170)">
    <!-- 1 RF tap -->
    <path class="arrow" d="M140 20 L320 20" marker-end="url(#ar1)"/>
    <text x="230" y="14" class="t" text-anchor="middle">1 · RF FIELD 13.56 MHZ · ANTICOLL</text>

    <!-- 2 NDEF -->
    <path class="arrowG" d="M320 50 L140 50" marker-end="url(#arG)"/>
    <text x="230" y="44" class="g" text-anchor="middle">2 · NDEF URL · CARD_ID · COUNTER</text>

    <!-- 3 Browser -->
    <path class="arrow" d="M140 80 L500 80" marker-end="url(#ar1)"/>
    <text x="320" y="74" class="t" text-anchor="middle">3 · GET /tap?card_id=…&amp;tap_seq=…</text>

    <!-- 4 page -->
    <path class="arrow" d="M500 110 L680 110" marker-end="url(#ar1)"/>
    <text x="590" y="104" class="t" text-anchor="middle">4 · POST /api/tap (server)</text>

    <!-- 5 verify -->
    <path class="arrow" d="M680 140 L860 140" marker-end="url(#ar1)"/>
    <text x="770" y="134" class="t" text-anchor="middle">5 · INSERT tap_events · RLS</text>

    <!-- 6 -->
    <path class="arrowG" d="M860 170 L680 170" marker-end="url(#arG)"/>
    <text x="770" y="164" class="g" text-anchor="middle">6 · TAP_ID · OK</text>

    <!-- 7 render -->
    <path class="arrowG" d="M680 200 L500 200" marker-end="url(#arG)"/>
    <text x="590" y="194" class="g" text-anchor="middle">7 · vCard · LinkedIn · Calendly</text>

    <!-- 8 -->
    <path class="arrowG" d="M500 230 L140 230" marker-end="url(#arG)"/>
    <text x="320" y="224" class="g" text-anchor="middle">8 · INTERACTIVE PAGE RENDER</text>

    <!-- 9 email queue -->
    <path class="arrow" d="M680 260 L860 260" marker-end="url(#ar1)"/>
    <text x="770" y="254" class="t" text-anchor="middle">9 · queue intro email (consent)</text>

    <!-- 10 owner notify -->
    <path class="arrow" d="M860 290 L1010 290" marker-end="url(#ar1)"/>
    <text x="935" y="284" class="t" text-anchor="middle">10 · realtime notify</text>

    <!-- 11 telemetry -->
    <path class="arrow" d="M320 320 L860 320" marker-end="url(#ar1)" stroke-dasharray="2 3"/>
    <text x="590" y="314" class="t" text-anchor="middle">11 · /api/device/telemetry · BATT · RSSI · TAMPER</text>
  </g>

  <!-- Notes -->
  <g transform="translate(60 504)" font-family="ui-monospace, Consolas, monospace" font-size="9" letter-spacing="2" fill="#9da0a8">
    <text>BUDGET: NFC ≤ 80 ms · TLS ≤ 120 ms · DB INSERT ≤ 60 ms · RENDER ≤ 200 ms · EMAIL ASYNC · TOTAL P95 ≤ 600 ms</text>
    <text x="0" y="14" fill="#c9a84c">SAFETY: NO CRED CAPTURE · NO AUTO-EXEC · CONSENT GATE PER CARD_ID · OWNER MAY HARD-DISABLE FROM /DASHBOARD</text>
  </g>
</svg>
