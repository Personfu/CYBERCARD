<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" font-family="JetBrains Mono, ui-monospace, monospace">
  <defs>
    <radialGradient id="vig" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0c0d11"/>
      <stop offset="100%" stop-color="#06070a"/>
    </radialGradient>
    <linearGradient id="metal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1c22"/>
      <stop offset="50%" stop-color="#2a2d36"/>
      <stop offset="100%" stop-color="#101218"/>
    </linearGradient>
    <pattern id="brushed" width="3" height="3" patternUnits="userSpaceOnUse">
      <rect width="3" height="3" fill="url(#metal)"/>
      <line x1="0" y1="1" x2="3" y2="1" stroke="#000" stroke-opacity="0.18"/>
    </pattern>
    <filter id="laser" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="0.4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow"><feGaussianBlur stdDeviation="2"/></filter>
  </defs>

  <rect width="1200" height="760" fill="url(#vig)"/>

  <!-- header -->
  <text x="60" y="60" fill="#00e5c8" font-size="11" letter-spacing="6">// CYBERCARD // METAL FACE // LASER-ENGRAVED</text>
  <text x="60" y="80" fill="#a9b4bf" font-size="10" letter-spacing="2">316L STAINLESS · ID-1 85.60×53.98mm · ENGRAVE DEPTH 30µm · FIBER 1064nm</text>

  <!-- card with brushed finish -->
  <g transform="translate(150 130)">
    <!-- card body -->
    <rect x="0" y="0" width="900" height="540" rx="24" fill="url(#brushed)" stroke="#3a3e48" stroke-width="1.5"/>
    <!-- subtle reflection -->
    <rect x="0" y="0" width="900" height="200" rx="24" fill="white" fill-opacity="0.025"/>

    <!-- engraved registration crosses -->
    <g stroke="#e8e4dc" stroke-width="0.8" opacity="0.55">
      <line x1="20" y1="20" x2="36" y2="20"/><line x1="28" y1="12" x2="28" y2="28"/>
      <line x1="864" y1="20" x2="880" y2="20"/><line x1="872" y1="12" x2="872" y2="28"/>
      <line x1="20" y1="520" x2="36" y2="520"/><line x1="28" y1="512" x2="28" y2="528"/>
      <line x1="864" y1="520" x2="880" y2="520"/><line x1="872" y1="512" x2="872" y2="528"/>
    </g>

    <!-- engraved monogram block -->
    <g filter="url(#laser)">
      <rect x="48" y="60" width="180" height="180" fill="none" stroke="#e8e4dc" stroke-width="1.2"/>
      <text x="138" y="170" text-anchor="middle" fill="#e8e4dc" font-size="120" font-weight="700" letter-spacing="-4">JD</text>
      <text x="138" y="210" text-anchor="middle" fill="#c9a84c" font-size="9" letter-spacing="6">JOHN DOE</text>
    </g>

    <!-- name plate -->
    <g filter="url(#laser)" fill="#e8e4dc">
      <text x="270" y="110" font-size="44" font-weight="700" letter-spacing="2">JOHN DOE</text>
      <text x="270" y="138" font-size="11" letter-spacing="6" fill="#c9a84c">PRINCIPAL · SYSTEMS &amp; SECURITY</text>
      <line x1="270" y1="156" x2="600" y2="156" stroke="#e8e4dc" stroke-width="0.8" opacity="0.6"/>

      <text x="270" y="186" font-size="10" letter-spacing="3" fill="#a9b4bf">PERSONFU // FLLC.NET</text>
      <text x="270" y="206" font-size="10" letter-spacing="3" fill="#a9b4bf">JOHN.DOE@FLLC.NET</text>
      <text x="270" y="226" font-size="10" letter-spacing="3" fill="#a9b4bf">+1 555 0100</text>
    </g>

    <!-- NFC tap target (engraved + filled) -->
    <g transform="translate(720 140)">
      <circle r="78" fill="none" stroke="#e8e4dc" stroke-width="1.2" stroke-dasharray="2 3" opacity="0.6"/>
      <g fill="none" stroke="#e8e4dc" stroke-width="1.6" stroke-linecap="round">
        <path d="M -22 0 A 22 22 0 0 1 22 0"/>
        <path d="M -36 0 A 36 36 0 0 1 36 0"/>
        <path d="M -50 0 A 50 50 0 0 1 50 0"/>
      </g>
      <circle r="6" fill="#e8e4dc"/>
      <text x="0" y="100" text-anchor="middle" font-size="9" letter-spacing="4" fill="#c9a84c">TAP HERE · NFC 13.56MHz</text>
    </g>

    <!-- bottom row: QR engraving + footer -->
    <g transform="translate(48 320)">
      <!-- QR (deterministic-looking pattern, decorative) -->
      <g fill="#e8e4dc">
        <rect x="0" y="0" width="160" height="160" fill="none" stroke="#e8e4dc" stroke-width="1"/>
        <!-- finder squares -->
        <rect x="8" y="8" width="36" height="36"/><rect x="14" y="14" width="24" height="24" fill="#06070a"/><rect x="20" y="20" width="12" height="12"/>
        <rect x="116" y="8" width="36" height="36"/><rect x="122" y="14" width="24" height="24" fill="#06070a"/><rect x="128" y="20" width="12" height="12"/>
        <rect x="8" y="116" width="36" height="36"/><rect x="14" y="122" width="24" height="24" fill="#06070a"/><rect x="20" y="128" width="12" height="12"/>
        <!-- pseudo data -->
        <g>
          <rect x="56" y="8" width="6" height="6"/><rect x="68" y="14" width="6" height="6"/><rect x="80" y="8" width="6" height="6"/><rect x="92" y="20" width="6" height="6"/><rect x="104" y="8" width="6" height="6"/>
          <rect x="56" y="32" width="6" height="6"/><rect x="74" y="38" width="6" height="6"/><rect x="92" y="32" width="6" height="6"/><rect x="104" y="44" width="6" height="6"/>
          <rect x="50" y="56" width="6" height="6"/><rect x="68" y="56" width="6" height="6"/><rect x="86" y="62" width="6" height="6"/><rect x="104" y="56" width="6" height="6"/><rect x="122" y="62" width="6" height="6"/><rect x="140" y="56" width="6" height="6"/>
          <rect x="56" y="80" width="6" height="6"/><rect x="74" y="74" width="6" height="6"/><rect x="92" y="86" width="6" height="6"/><rect x="116" y="80" width="6" height="6"/><rect x="134" y="86" width="6" height="6"/>
          <rect x="50" y="104" width="6" height="6"/><rect x="68" y="98" width="6" height="6"/><rect x="86" y="110" width="6" height="6"/><rect x="104" y="98" width="6" height="6"/><rect x="122" y="110" width="6" height="6"/>
          <rect x="56" y="128" width="6" height="6"/><rect x="80" y="134" width="6" height="6"/><rect x="98" y="128" width="6" height="6"/><rect x="116" y="140" width="6" height="6"/><rect x="134" y="128" width="6" height="6"/>
          <rect x="68" y="146" width="6" height="6"/><rect x="92" y="146" width="6" height="6"/><rect x="116" y="146" width="6" height="6"/>
        </g>
      </g>
      <text x="0" y="180" font-size="9" letter-spacing="3" fill="#a9b4bf">QR · /tap?card_id=metal_v1</text>
    </g>

    <!-- right tech specs engraved at bottom -->
    <g transform="translate(240 340)" fill="#e8e4dc">
      <text font-size="10" letter-spacing="3" fill="#c9a84c">// SUBSTRATE TELEMETRY</text>
      <g font-size="10" letter-spacing="2" fill="#a9b4bf">
        <text y="22">SUBSTRATE       316L STAINLESS / PVD BLACK</text>
        <text y="40">NFC TAG         NTAG216  ·  888 B USER MEM</text>
        <text y="58">COIL            4-TURN ETCH  ·  Z₀ 50Ω TUNED 13.56 MHz</text>
        <text y="76">QR PAYLOAD      /tap?card_id=metal_v1</text>
        <text y="94">AR MARKER       /tap?card_id=ar_v1</text>
        <text y="112">CHALLENGE       /challenge/&lt;sha256&gt;</text>
        <text y="130">AUDIT           Supabase RLS + audit_events</text>
        <text y="148">CONSENT         disclosed before any record</text>
      </g>
    </g>

    <!-- bottom-edge engraved tag -->
    <g transform="translate(48 500)">
      <text font-size="9" letter-spacing="6" fill="#e8e4dc">FLLC.NET / CYBERCARD / METAL_V1 / 2026</text>
      <text x="852" text-anchor="end" font-size="9" letter-spacing="6" fill="#c9a84c">SN 0001-A</text>
    </g>
  </g>

  <!-- bottom legend -->
  <text x="60" y="730" fill="#a9b4bf" font-size="9" letter-spacing="3">FIG. 01 — LASER-ENGRAVED FRONT FACE · CONSENT-FIRST IDENTITY · TAG IS PUBLIC, BACKEND IS AUTHORITATIVE</text>
</svg>
