<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 800" font-family="JetBrains Mono, ui-monospace, monospace">
  <defs>
    <radialGradient id="vig" cx="50%" cy="50%" r="70%"><stop offset="0%" stop-color="#0c0d11"/><stop offset="100%" stop-color="#06070a"/></radialGradient>
    <linearGradient id="metalE" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#3a3e48"/><stop offset="100%" stop-color="#1a1c22"/></linearGradient>
    <linearGradient id="copperE" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#d4b35a"/><stop offset="100%" stop-color="#8a6f2c"/></linearGradient>
  </defs>
  <rect width="1280" height="800" fill="url(#vig)"/>

  <text x="60" y="50" fill="#00e5c8" font-size="11" letter-spacing="6">// CYBERCARD // CROSS-SECTION · MICROSCOPE VIEW</text>
  <text x="60" y="70" fill="#a9b4bf" font-size="10" letter-spacing="2">A-A SECTION · 50× MAG · STACK 2.6 mm · DIM IN µm</text>

  <!-- microscope frame -->
  <g transform="translate(140 110)">
    <rect x="-10" y="-10" width="1020" height="540" fill="none" stroke="#243038" stroke-width="1"/>
    <text x="-10" y="-16" fill="#a9b4bf" font-size="8" letter-spacing="2">SCALE 1µm = 0.6px</text>

    <!-- layers as horizontal slabs, label sizes in µm -->
    <!-- L1 Top engraved metal cap 200µm = 120px -->
    <g transform="translate(0 0)">
      <rect x="0" y="0" width="1000" height="120" fill="url(#metalE)" stroke="#e8e4dc" stroke-width="1"/>
      <!-- engraving notches (cuts) -->
      <g fill="#06070a" stroke="#e8e4dc" stroke-width="0.4">
        <path d="M 100 0 L 110 30 L 90 30 Z"/>
        <path d="M 200 0 L 210 30 L 190 30 Z"/>
        <path d="M 300 0 L 310 30 L 290 30 Z"/>
        <path d="M 400 0 L 410 30 L 390 30 Z"/>
        <path d="M 500 0 L 510 30 L 490 30 Z"/>
        <path d="M 600 0 L 610 30 L 590 30 Z"/>
        <path d="M 700 0 L 710 30 L 690 30 Z"/>
        <path d="M 800 0 L 810 30 L 790 30 Z"/>
      </g>
      <text x="20" y="70" fill="#e8e4dc" font-size="11" letter-spacing="3">L1 · 316L STAINLESS · LASER ENGRAVED</text>
      <text x="980" y="70" text-anchor="end" fill="#c9a84c" font-size="10" letter-spacing="3">200 µm</text>
    </g>

    <!-- adhesive 30µm = 18px -->
    <g transform="translate(0 120)">
      <rect x="0" y="0" width="1000" height="18" fill="#3a2d18" stroke="#a9b4bf" stroke-width="0.4"/>
      <text x="20" y="14" fill="#c9a84c" font-size="9" letter-spacing="2">L1.5 · ADHESIVE 3M VHB</text>
      <text x="980" y="14" text-anchor="end" fill="#c9a84c" font-size="9">30 µm</text>
    </g>

    <!-- L2 ferrite shield 80µm = 48px -->
    <g transform="translate(0 138)">
      <rect x="0" y="0" width="1000" height="48" fill="#15171c" stroke="#a9b4bf" stroke-width="0.5"/>
      <g stroke="#a9b4bf" stroke-width="0.4" opacity="0.7">
        <path d="M 0 12 H 1000 M 0 24 H 1000 M 0 36 H 1000"/>
      </g>
      <text x="20" y="30" fill="#e8e4dc" font-size="11" letter-spacing="3">L2 · FERRITE DECOUPLER · NiZn</text>
      <text x="980" y="30" text-anchor="end" fill="#c9a84c" font-size="10">80 µm</text>
    </g>

    <!-- L3 NFC coil layer 35µm Cu on 100µm core = 80px -->
    <g transform="translate(0 186)">
      <rect x="0" y="0" width="1000" height="22" fill="url(#copperE)" stroke="#e8e4dc" stroke-width="0.5"/>
      <!-- spiral cross-section dots showing turns cut -->
      <g fill="#06070a" stroke="#d4b35a" stroke-width="0.5">
        <rect x="120" y="2" width="18" height="18"/>
        <rect x="160" y="2" width="18" height="18"/>
        <rect x="200" y="2" width="18" height="18"/>
        <rect x="240" y="2" width="18" height="18"/>
        <rect x="700" y="2" width="18" height="18"/>
        <rect x="740" y="2" width="18" height="18"/>
        <rect x="780" y="2" width="18" height="18"/>
        <rect x="820" y="2" width="18" height="18"/>
      </g>
      <text x="20" y="16" fill="#06070a" font-size="10" letter-spacing="2" font-weight="700">L3 · 35µm Cu COIL</text>
      <text x="980" y="16" text-anchor="end" fill="#06070a" font-size="9">35 µm</text>
    </g>

    <!-- L4 FR-4 / Rogers core 100µm = 60px -->
    <g transform="translate(0 208)">
      <rect x="0" y="0" width="1000" height="60" fill="#0a1e1a" stroke="#00e5c8" stroke-width="0.5"/>
      <text x="20" y="36" fill="#00e5c8" font-size="11" letter-spacing="3">L4 · RO4350B HYBRID CORE · εr 3.66</text>
      <text x="980" y="36" text-anchor="end" fill="#00e5c8" font-size="10">100 µm</text>
    </g>

    <!-- L5 components-bearing layer 1000µm = 200px (compressed) -->
    <g transform="translate(0 268)">
      <rect x="0" y="0" width="1000" height="180" fill="#0a0c10" stroke="#e8e4dc" stroke-width="0.6"/>
      <!-- ESP32-S3 -->
      <g transform="translate(80 30)">
        <rect x="0" y="0" width="160" height="120" fill="#1a1c22" stroke="#e8e4dc" stroke-width="0.8"/>
        <text x="80" y="50" text-anchor="middle" fill="#e8e4dc" font-size="10">ESP32-S3</text>
        <text x="80" y="68" text-anchor="middle" fill="#a9b4bf" font-size="7">8×8 mm QFN</text>
        <!-- bond wires -->
        <g stroke="#c9a84c" stroke-width="0.4" fill="none">
          <path d="M 10 10 q 5 -8 14 0"/>
          <path d="M 30 10 q 5 -8 14 0"/>
          <path d="M 50 10 q 5 -8 14 0"/>
          <path d="M 70 10 q 5 -8 14 0"/>
        </g>
        <!-- BGA balls -->
        <g fill="#c9a84c"><circle cx="20" cy="124" r="3"/><circle cx="40" cy="124" r="3"/><circle cx="60" cy="124" r="3"/><circle cx="80" cy="124" r="3"/><circle cx="100" cy="124" r="3"/><circle cx="120" cy="124" r="3"/><circle cx="140" cy="124" r="3"/></g>
      </g>
      <!-- PN5180 -->
      <g transform="translate(280 60)">
        <rect x="0" y="0" width="120" height="80" fill="#1a1c22" stroke="#e8e4dc" stroke-width="0.8"/>
        <text x="60" y="34" text-anchor="middle" fill="#e8e4dc" font-size="10">PN5180</text>
        <text x="60" y="52" text-anchor="middle" fill="#a9b4bf" font-size="7">HVQFN32</text>
        <g fill="#c9a84c"><circle cx="20" cy="84" r="2.4"/><circle cx="40" cy="84" r="2.4"/><circle cx="60" cy="84" r="2.4"/><circle cx="80" cy="84" r="2.4"/><circle cx="100" cy="84" r="2.4"/></g>
      </g>
      <!-- CC1101 -->
      <g transform="translate(440 60)">
        <rect x="0" y="0" width="120" height="80" fill="#1a1c22" stroke="#e8e4dc" stroke-width="0.8"/>
        <text x="60" y="34" text-anchor="middle" fill="#e8e4dc" font-size="10">CC1101</text>
        <text x="60" y="52" text-anchor="middle" fill="#a9b4bf" font-size="7">QLP20</text>
        <g fill="#c9a84c"><circle cx="20" cy="84" r="2.4"/><circle cx="40" cy="84" r="2.4"/><circle cx="60" cy="84" r="2.4"/><circle cx="80" cy="84" r="2.4"/><circle cx="100" cy="84" r="2.4"/></g>
      </g>
      <!-- Battery -->
      <g transform="translate(620 50)">
        <rect x="0" y="0" width="280" height="100" fill="#1a1208" stroke="#c9a84c" stroke-width="1"/>
        <text x="140" y="44" text-anchor="middle" fill="#c9a84c" font-size="11">LiPo 3.7V · 250 mAh</text>
        <text x="140" y="62" text-anchor="middle" fill="#a9b4bf" font-size="8">SOFT POUCH · BMS</text>
        <text x="140" y="78" text-anchor="middle" fill="#a9b4bf" font-size="7">1.5 mm</text>
      </g>
      <text x="20" y="170" fill="#e8e4dc" font-size="11" letter-spacing="3">L5 · COMPONENT MOUNT · 1.0 mm POPULATED ZONE</text>
      <text x="980" y="170" text-anchor="end" fill="#c9a84c" font-size="10">1000 µm</text>
    </g>

    <!-- L6 ground plane 35µm = 22px -->
    <g transform="translate(0 448)">
      <rect x="0" y="0" width="1000" height="22" fill="url(#copperE)" stroke="#e8e4dc" stroke-width="0.5"/>
      <text x="20" y="16" fill="#06070a" font-size="10" letter-spacing="2" font-weight="700">L6 · 35µm Cu GROUND PLANE</text>
      <text x="980" y="16" text-anchor="end" fill="#06070a" font-size="9">35 µm</text>
    </g>

    <!-- L7 bottom plate 200µm = 32px -->
    <g transform="translate(0 470)">
      <rect x="0" y="0" width="1000" height="48" fill="url(#metalE)" stroke="#e8e4dc" stroke-width="1"/>
      <text x="20" y="30" fill="#e8e4dc" font-size="11" letter-spacing="3">L7 · BACK SHELL · BLACK PVD COATED</text>
      <text x="980" y="30" text-anchor="end" fill="#c9a84c" font-size="10">200 µm</text>
    </g>

    <!-- callouts on right -->
    <g transform="translate(1050 0)" fill="#a9b4bf" font-size="9" letter-spacing="2">
      <text x="0" y="14" fill="#00e5c8">// SECTION DIMS</text>
      <text x="0" y="30">Σ stack ≤ 2.6 mm</text>
      <text x="0" y="48">Z₀ traces 50 Ω</text>
      <text x="0" y="66">εr core 3.66</text>
      <text x="0" y="84">Cu purity 99.9%</text>
      <text x="0" y="102">Engrave depth 30µm</text>
      <text x="0" y="120">Tolerance ±50µm</text>
    </g>
  </g>

  <!-- crosshair / scale bar -->
  <g transform="translate(140 720)" stroke="#00e5c8" stroke-width="1" fill="#00e5c8" font-size="9" letter-spacing="3">
    <line x1="0" y1="0" x2="200" y2="0"/>
    <line x1="0" y1="-5" x2="0" y2="5"/>
    <line x1="200" y1="-5" x2="200" y2="5"/>
    <text x="100" y="20" text-anchor="middle">100 µm</text>
  </g>

  <text x="60" y="780" fill="#a9b4bf" font-size="9" letter-spacing="3">FIG. 05 — A-A CROSS-SECTION · NEAR-FIELD MAGNETIC COUPLING DOMINATES AT 13.56 MHz · NO CREDENTIAL CAPTURE PATHS</text>
</svg>
