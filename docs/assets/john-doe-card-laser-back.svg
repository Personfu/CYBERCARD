<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" font-family="JetBrains Mono, ui-monospace, monospace">
  <defs>
    <radialGradient id="vig" cx="50%" cy="50%" r="70%"><stop offset="0%" stop-color="#0c0d11"/><stop offset="100%" stop-color="#06070a"/></radialGradient>
    <linearGradient id="metal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1c22"/><stop offset="50%" stop-color="#2a2d36"/><stop offset="100%" stop-color="#101218"/>
    </linearGradient>
    <pattern id="brushed" width="3" height="3" patternUnits="userSpaceOnUse"><rect width="3" height="3" fill="url(#metal)"/><line x1="0" y1="1" x2="3" y2="1" stroke="#000" stroke-opacity="0.18"/></pattern>
  </defs>
  <rect width="1200" height="760" fill="url(#vig)"/>

  <text x="60" y="60" fill="#00e5c8" font-size="11" letter-spacing="6">// CYBERCARD // METAL BACK // ENGRAVED COIL + B-FIELD</text>
  <text x="60" y="80" fill="#a9b4bf" font-size="10" letter-spacing="2">4-TURN SPIRAL · L≈2.5µH · TUNE C≈55pF · f₀=13.56MHz · Q≈30-40</text>

  <g transform="translate(150 130)">
    <rect x="0" y="0" width="900" height="540" rx="24" fill="url(#brushed)" stroke="#3a3e48" stroke-width="1.5"/>

    <!-- engraved coil left side -->
    <g transform="translate(220 270)">
      <!-- coil spiral, 4 turns, etched look -->
      <g fill="none" stroke="#e8e4dc" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M -130 -80 H 130 V 80 H -130 V -70 H 120 V 70 H -120 V -60 H 110 V 60 H -110 V -50 H 100 V 50 H -100"/>
      </g>
      <!-- pads -->
      <circle cx="-130" cy="-80" r="5" fill="#c9a84c"/>
      <circle cx="-100" cy="-50" r="5" fill="#c9a84c"/>
      <text x="0" y="-110" text-anchor="middle" fill="#c9a84c" font-size="9" letter-spacing="4">NFC ANTENNA · 13.56 MHz</text>
      <text x="-130" y="-90" font-size="8" fill="#a9b4bf">P1</text>
      <text x="-100" y="-60" font-size="8" fill="#a9b4bf">P2</text>

      <!-- B-field arrows -->
      <g stroke="#00e5c8" stroke-width="1.2" fill="#00e5c8" opacity="0.85">
        <path d="M 0 0 v -160" stroke-dasharray="3 3" fill="none"/>
        <polygon points="0,-160 -4,-152 4,-152"/>
        <text x="10" y="-120" font-size="9" letter-spacing="2" fill="#00e5c8">B</text>
      </g>
      <!-- field rings -->
      <g fill="none" stroke="#00e5c8" stroke-opacity="0.35">
        <ellipse cx="0" cy="0" rx="170" ry="55"/>
        <ellipse cx="0" cy="0" rx="200" ry="78"/>
        <ellipse cx="0" cy="0" rx="230" ry="100"/>
      </g>
    </g>

    <!-- right side: dimensions + electrical params -->
    <g transform="translate(580 80)" fill="#e8e4dc">
      <text font-size="11" letter-spacing="6" fill="#c9a84c">// COIL GEOMETRY</text>
      <g font-size="10" letter-spacing="2" fill="#a9b4bf">
        <text y="24">d_out      52.0 × 32.0 mm</text>
        <text y="42">d_in       38.0 × 18.0 mm</text>
        <text y="60">turns N    4</text>
        <text y="78">trace w    0.30 mm  ·  spacing 0.20 mm</text>
        <text y="96">L          ≈ 2.5 µH (Wheeler)</text>
        <text y="114">C_match    ≈ 55 pF  (split parallel/series)</text>
        <text y="132">R_Q        ≈ 5.3 Ω @ Q=40</text>
      </g>

      <text y="170" font-size="11" letter-spacing="6" fill="#c9a84c">// PHYSICS</text>
      <g font-size="10" letter-spacing="2" fill="#a9b4bf">
        <text y="194">f₀ = 1 / (2π·√(L·C))</text>
        <text y="212">λ = c/f = 22.11 m</text>
        <text y="230">r_near = λ/(2π) ≈ 3.52 m (theoretical)</text>
        <text y="248">k_couple → cm-scale practical range</text>
      </g>

      <text y="286" font-size="11" letter-spacing="6" fill="#c9a84c">// FALLBACK</text>
      <g font-size="10" letter-spacing="2" fill="#a9b4bf">
        <text y="310">QR · /tap?card_id=scan_v1</text>
        <text y="328">AR · /tap?card_id=ar_v1</text>
        <text y="346">FILE · /tap?card_id=file_v1</text>
        <text y="364">CHALLENGE · /challenge/&lt;sha256&gt;</text>
      </g>
    </g>

    <!-- dimension callouts on coil -->
    <g stroke="#00e5c8" stroke-width="0.6" fill="#00e5c8" font-size="9" letter-spacing="2">
      <line x1="90" y1="180" x2="90" y2="360" stroke-dasharray="2 2"/>
      <text x="50" y="278">32mm</text>
      <line x1="90" y1="180" x2="350" y2="180" stroke-dasharray="2 2"/>
      <text x="200" y="172">52mm</text>
    </g>

    <!-- footer -->
    <g transform="translate(48 500)">
      <text font-size="9" letter-spacing="6" fill="#e8e4dc">FLLC.NET / CYBERCARD / NFC COIL / B-FIELD MAGNETIC NEAR-FIELD</text>
      <text x="852" text-anchor="end" font-size="9" letter-spacing="6" fill="#c9a84c">REV B</text>
    </g>
  </g>

  <text x="60" y="730" fill="#a9b4bf" font-size="9" letter-spacing="3">FIG. 02 — ENGRAVED REAR · COUPLING IS MAGNETIC NOT RADIATIVE · CARD IS ELECTRICALLY TINY (≪λ/10)</text>
</svg>
