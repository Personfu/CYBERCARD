<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 760" font-family="JetBrains Mono, ui-monospace, monospace">
  <defs>
    <radialGradient id="vig" cx="50%" cy="50%" r="70%"><stop offset="0%" stop-color="#0c0d11"/><stop offset="100%" stop-color="#06070a"/></radialGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1a2128" stroke-width="0.5"/>
    </pattern>
    <pattern id="grid2" width="200" height="200" patternUnits="userSpaceOnUse">
      <path d="M 200 0 L 0 0 0 200" fill="none" stroke="#243038" stroke-width="0.7"/>
    </pattern>
  </defs>
  <rect width="1280" height="760" fill="url(#vig)"/>
  <rect width="1280" height="760" fill="url(#grid)"/>
  <rect width="1280" height="760" fill="url(#grid2)"/>

  <text x="60" y="50" fill="#00e5c8" font-size="11" letter-spacing="6">// CYBERCARD // X-RAY TOP VIEW · TRACE + COMPONENT MAP</text>
  <text x="60" y="70" fill="#a9b4bf" font-size="10" letter-spacing="2">SCALE 8:1 · 4-LAYER ROUTING · L1 RED · L2 GND · L3 PWR · L4 BLUE</text>

  <!-- card outline -->
  <g transform="translate(140 130)">
    <!-- card border -->
    <rect x="0" y="0" width="1000" height="540" rx="32" fill="#06070a" stroke="#e8e4dc" stroke-width="1.4" stroke-dasharray="6 4"/>

    <!-- mounting holes -->
    <g fill="none" stroke="#e8e4dc" stroke-width="0.8">
      <circle cx="20" cy="20" r="5"/><circle cx="980" cy="20" r="5"/>
      <circle cx="20" cy="520" r="5"/><circle cx="980" cy="520" r="5"/>
    </g>

    <!-- NFC coil (top half right) -->
    <g transform="translate(740 200)" fill="none" stroke="#c9a84c" stroke-width="2">
      <path d="M -130 -80 H 130 V 80 H -130 V -70 H 120 V 70 H -120 V -60 H 110 V 60 H -110 V -50 H 100 V 50 H -100"/>
    </g>
    <text x="740" y="100" text-anchor="middle" fill="#c9a84c" font-size="9" letter-spacing="3">NFC COIL · 4T · L≈2.5µH</text>

    <!-- Components (left half) -->
    <!-- ESP32-S3 -->
    <g transform="translate(140 110)">
      <rect x="0" y="0" width="160" height="100" fill="#0a0c10" stroke="#e8e4dc" stroke-width="1"/>
      <text x="80" y="50" text-anchor="middle" fill="#e8e4dc" font-size="14" font-weight="700">ESP32-S3</text>
      <text x="80" y="68" text-anchor="middle" fill="#a9b4bf" font-size="8">WROOM-1U · 240MHz · Wi-Fi/BLE</text>
      <text x="80" y="84" text-anchor="middle" fill="#00e5c8" font-size="7">U1</text>
      <!-- pins -->
      <g fill="#c9a84c">
        <rect x="-4" y="10" width="4" height="2"/><rect x="-4" y="20" width="4" height="2"/><rect x="-4" y="30" width="4" height="2"/><rect x="-4" y="40" width="4" height="2"/><rect x="-4" y="50" width="4" height="2"/><rect x="-4" y="60" width="4" height="2"/><rect x="-4" y="70" width="4" height="2"/><rect x="-4" y="80" width="4" height="2"/><rect x="-4" y="90" width="4" height="2"/>
        <rect x="160" y="10" width="4" height="2"/><rect x="160" y="20" width="4" height="2"/><rect x="160" y="30" width="4" height="2"/><rect x="160" y="40" width="4" height="2"/><rect x="160" y="50" width="4" height="2"/><rect x="160" y="60" width="4" height="2"/><rect x="160" y="70" width="4" height="2"/><rect x="160" y="80" width="4" height="2"/><rect x="160" y="90" width="4" height="2"/>
      </g>
    </g>

    <!-- PN5180 NFC -->
    <g transform="translate(340 130)">
      <rect x="0" y="0" width="100" height="60" fill="#0a0c10" stroke="#e8e4dc" stroke-width="1"/>
      <text x="50" y="28" text-anchor="middle" fill="#e8e4dc" font-size="11" font-weight="700">PN5180</text>
      <text x="50" y="44" text-anchor="middle" fill="#a9b4bf" font-size="7">NFC FRONTEND</text>
      <text x="50" y="56" text-anchor="middle" fill="#00e5c8" font-size="7">U2</text>
    </g>

    <!-- CC1101 -->
    <g transform="translate(140 250)">
      <rect x="0" y="0" width="100" height="60" fill="#0a0c10" stroke="#e8e4dc" stroke-width="1"/>
      <text x="50" y="28" text-anchor="middle" fill="#e8e4dc" font-size="11" font-weight="700">CC1101</text>
      <text x="50" y="44" text-anchor="middle" fill="#a9b4bf" font-size="7">SUB-GHz RADIO</text>
      <text x="50" y="56" text-anchor="middle" fill="#00e5c8" font-size="7">U3</text>
    </g>

    <!-- NTAG216 -->
    <g transform="translate(340 220)">
      <rect x="0" y="0" width="80" height="40" fill="#0a0c10" stroke="#e8e4dc" stroke-width="1"/>
      <text x="40" y="22" text-anchor="middle" fill="#e8e4dc" font-size="10">NTAG216</text>
      <text x="40" y="34" text-anchor="middle" fill="#00e5c8" font-size="7">U4</text>
    </g>

    <!-- OLED -->
    <g transform="translate(140 360)">
      <rect x="0" y="0" width="200" height="60" fill="#0a0c10" stroke="#e8e4dc" stroke-width="1"/>
      <text x="100" y="28" text-anchor="middle" fill="#e8e4dc" font-size="11">SSD1306 OLED 128×64</text>
      <text x="100" y="46" text-anchor="middle" fill="#00e5c8" font-size="7">D1</text>
    </g>

    <!-- Battery (dashed = below) -->
    <g transform="translate(380 360)">
      <rect x="0" y="0" width="220" height="100" fill="none" stroke="#c9a84c" stroke-width="1" stroke-dasharray="4 3"/>
      <text x="110" y="48" text-anchor="middle" fill="#c9a84c" font-size="11">LiPo 250 mAh</text>
      <text x="110" y="64" text-anchor="middle" fill="#a9b4bf" font-size="8">60×35×1.5 mm · BACK FACE</text>
      <text x="110" y="82" text-anchor="middle" fill="#00e5c8" font-size="7">B1</text>
    </g>

    <!-- USB-C -->
    <g transform="translate(630 110)">
      <rect x="0" y="0" width="60" height="36" fill="#0a0c10" stroke="#e8e4dc" stroke-width="1"/>
      <text x="30" y="22" text-anchor="middle" fill="#e8e4dc" font-size="9">USB-C</text>
      <text x="30" y="32" text-anchor="middle" fill="#00e5c8" font-size="6">J1</text>
    </g>

    <!-- WS2812 LEDs -->
    <g transform="translate(550 130)" fill="#00e5c8">
      <circle cx="0" cy="0" r="5" stroke="#e8e4dc" stroke-width="0.6"/>
      <circle cx="20" cy="0" r="5" stroke="#e8e4dc" stroke-width="0.6"/>
      <circle cx="40" cy="0" r="5" stroke="#e8e4dc" stroke-width="0.6"/>
      <text x="20" y="20" text-anchor="middle" fill="#a9b4bf" font-size="7">3× WS2812</text>
    </g>

    <!-- Button -->
    <g transform="translate(550 220)">
      <circle cx="0" cy="0" r="14" fill="#0a0c10" stroke="#e8e4dc" stroke-width="1"/>
      <circle cx="0" cy="0" r="6" fill="#c9a84c"/>
      <text x="0" y="36" text-anchor="middle" fill="#a9b4bf" font-size="7">SW1 · CENTER</text>
    </g>

    <!-- Sub-GHz F-antenna -->
    <g transform="translate(820 460)" stroke="#c9a84c" stroke-width="2" fill="none">
      <path d="M 0 0 H 80 M 10 0 V -20 H 50 M 30 0 V -10 H 50"/>
      <text x="40" y="20" text-anchor="middle" fill="#c9a84c" font-size="8">F-ANT 433/868/915</text>
    </g>

    <!-- Routing traces (4 layers, color-coded) -->
    <g fill="none" stroke-width="1.4" opacity="0.85">
      <!-- L1 red SPI bus from ESP to PN5180 -->
      <path stroke="#ff4d6d" d="M 300 130 H 340"/>
      <path stroke="#ff4d6d" d="M 300 140 H 340"/>
      <path stroke="#ff4d6d" d="M 300 150 H 340"/>
      <!-- L1 red SPI to CC1101 -->
      <path stroke="#ff4d6d" d="M 220 210 V 250"/>
      <path stroke="#ff4d6d" d="M 230 210 V 250"/>
      <!-- L4 blue I2C to OLED -->
      <path stroke="#4da6ff" d="M 220 210 V 360"/>
      <path stroke="#4da6ff" d="M 240 210 V 360"/>
      <!-- L3 yellow power rail to battery -->
      <path stroke="#c9a84c" d="M 660 146 V 360 H 600"/>
      <!-- coil traces from PN5180 to coil -->
      <path stroke="#ff4d6d" d="M 440 160 L 610 200 L 740 200 L 740 120"/>
      <path stroke="#4da6ff" d="M 440 170 L 610 220 L 740 280"/>
      <!-- gnd hatch peek -->
      <path stroke="#5a6b78" stroke-dasharray="2 2" d="M 100 480 H 900"/>
    </g>

    <!-- Vias (drilled holes) -->
    <g fill="#06070a" stroke="#e8e4dc" stroke-width="0.6">
      <circle cx="305" cy="160" r="2.5"/>
      <circle cx="445" cy="170" r="2.5"/>
      <circle cx="612" cy="220" r="2.5"/>
      <circle cx="225" cy="220" r="2.5"/>
      <circle cx="245" cy="220" r="2.5"/>
    </g>

    <!-- ruler bottom -->
    <g stroke="#a9b4bf" stroke-width="0.4" fill="#a9b4bf" font-size="7">
      <line x1="0" y1="510" x2="1000" y2="510"/>
      <g>
        <line x1="0" y1="505" x2="0" y2="515"/><text x="0" y="528" text-anchor="middle">0</text>
        <line x1="200" y1="505" x2="200" y2="515"/><text x="200" y="528" text-anchor="middle">17.1</text>
        <line x1="400" y1="505" x2="400" y2="515"/><text x="400" y="528" text-anchor="middle">34.2</text>
        <line x1="600" y1="505" x2="600" y2="515"/><text x="600" y="528" text-anchor="middle">51.4</text>
        <line x1="800" y1="505" x2="800" y2="515"/><text x="800" y="528" text-anchor="middle">68.5</text>
        <line x1="1000" y1="505" x2="1000" y2="515"/><text x="1000" y="528" text-anchor="middle">85.60mm</text>
      </g>
    </g>
  </g>

  <!-- legend -->
  <g transform="translate(60 700)" font-size="9" letter-spacing="2" fill="#a9b4bf">
    <rect x="0" y="-10" width="14" height="3" fill="#ff4d6d"/><text x="22" y="-2">L1 SIGNAL · SPI</text>
    <rect x="180" y="-10" width="14" height="3" fill="#5a6b78"/><text x="202" y="-2">L2 GND</text>
    <rect x="320" y="-10" width="14" height="3" fill="#c9a84c"/><text x="342" y="-2">L3 PWR</text>
    <rect x="460" y="-10" width="14" height="3" fill="#4da6ff"/><text x="482" y="-2">L4 SIGNAL · I2C</text>
    <text x="640" y="-2">FIG. 04 — X-RAY ROUTING · ALL ASSIGNMENTS MATCH README PIN MAP</text>
  </g>
</svg>
