<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 800" font-family="JetBrains Mono, ui-monospace, monospace">
  <defs>
    <radialGradient id="vig" cx="50%" cy="50%" r="70%"><stop offset="0%" stop-color="#0c0d11"/><stop offset="100%" stop-color="#06070a"/></radialGradient>
    <linearGradient id="layer" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1c22"/><stop offset="100%" stop-color="#0c0d11"/>
    </linearGradient>
    <linearGradient id="copper" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c9a84c"/><stop offset="100%" stop-color="#8a6f2c"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="800" fill="url(#vig)"/>

  <text x="60" y="50" fill="#00e5c8" font-size="11" letter-spacing="6">// CYBERCARD // ISOMETRIC EXPLODED SLICE · 5-LAYER STACK</text>
  <text x="60" y="70" fill="#a9b4bf" font-size="10" letter-spacing="2">ID-1 ENVELOPE 85.60 × 53.98 mm · STACK ≤ 2.6 mm · CONTROLLED Z₀ 50Ω</text>

  <!-- Isometric exploded layers; iso transform: skewX(-30) scaleY(0.6) -->
  <g transform="translate(640 480)">
    <!-- helper: draw a card slab as iso parallelogram -->
    <!-- Each slab is a rect with iso transform, offset upward to "explode" -->

    <!-- Layer 6: Top cap (engraved face) - top -->
    <g transform="translate(0 -240) rotate(-30) skewX(-30) scale(1 0.55)">
      <rect x="-300" y="-180" width="600" height="360" rx="14" fill="url(#layer)" stroke="#e8e4dc" stroke-width="1.2"/>
      <!-- monogram -->
      <text x="-260" y="-100" fill="#e8e4dc" font-size="40" font-weight="700">JD</text>
      <text x="-200" y="-100" fill="#c9a84c" font-size="14" letter-spacing="3">JOHN DOE</text>
      <!-- NFC engraved arcs -->
      <g transform="translate(180 0)" fill="none" stroke="#e8e4dc" stroke-width="1.4">
        <path d="M -22 0 A 22 22 0 0 1 22 0"/>
        <path d="M -36 0 A 36 36 0 0 1 36 0"/>
        <path d="M -50 0 A 50 50 0 0 1 50 0"/>
      </g>
    </g>
    <text x="380" y="-260" fill="#00e5c8" font-size="10" letter-spacing="3">L1 · ENGRAVED FACE · 316L STAINLESS</text>
    <line x1="220" y1="-238" x2="380" y2="-260" stroke="#00e5c8" stroke-width="0.6"/>

    <!-- Layer 5: ferrite shield -->
    <g transform="translate(0 -130) rotate(-30) skewX(-30) scale(1 0.55)">
      <rect x="-300" y="-180" width="600" height="360" rx="14" fill="#15171c" stroke="#a9b4bf" stroke-width="0.8"/>
      <g stroke="#a9b4bf" stroke-width="0.4" opacity="0.5">
        <path d="M -300 -120 H 300 M -300 -60 H 300 M -300 0 H 300 M -300 60 H 300 M -300 120 H 300"/>
      </g>
    </g>
    <text x="380" y="-150" fill="#00e5c8" font-size="10" letter-spacing="3">L2 · FERRITE DECOUPLER · 80µm</text>
    <line x1="220" y1="-128" x2="380" y2="-150" stroke="#00e5c8" stroke-width="0.6"/>

    <!-- Layer 4: NFC coil layer (copper spiral) -->
    <g transform="translate(0 -30) rotate(-30) skewX(-30) scale(1 0.55)">
      <rect x="-300" y="-180" width="600" height="360" rx="14" fill="#0e1014" stroke="#e8e4dc" stroke-width="0.8"/>
      <!-- spiral -->
      <g transform="translate(150 0)" fill="none" stroke="url(#copper)" stroke-width="3" stroke-linecap="round">
        <path d="M -130 -90 H 130 V 90 H -130 V -78 H 118 V 78 H -118 V -66 H 106 V 66 H -106 V -54 H 94 V 54 H -94"/>
      </g>
      <!-- traces leading to chip -->
      <g stroke="url(#copper)" stroke-width="2" fill="none">
        <path d="M -130 -90 L -240 -120 L -240 0"/>
      </g>
    </g>
    <text x="380" y="-50" fill="#00e5c8" font-size="10" letter-spacing="3">L3 · COIL ETCH · 35µm Cu · 13.56 MHz</text>
    <line x1="220" y1="-28" x2="380" y2="-50" stroke="#00e5c8" stroke-width="0.6"/>

    <!-- Layer 3: 4-layer FR4 PCB with components -->
    <g transform="translate(0 80) rotate(-30) skewX(-30) scale(1 0.55)">
      <rect x="-300" y="-180" width="600" height="360" rx="14" fill="#0a1e1a" stroke="#00e5c8" stroke-width="1"/>
      <!-- silkscreen -->
      <text x="-280" y="-160" fill="#00e5c8" font-size="11" letter-spacing="2">CYBERCARD v0</text>
      <!-- ESP32-S3 module -->
      <rect x="-220" y="-100" width="120" height="80" fill="#06070a" stroke="#e8e4dc" stroke-width="0.8"/>
      <text x="-160" y="-60" text-anchor="middle" fill="#e8e4dc" font-size="9">ESP32-S3</text>
      <text x="-160" y="-46" text-anchor="middle" fill="#a9b4bf" font-size="7">WROOM-1U</text>
      <!-- PN5180 -->
      <rect x="-80" y="-100" width="80" height="60" fill="#06070a" stroke="#e8e4dc" stroke-width="0.8"/>
      <text x="-40" y="-66" text-anchor="middle" fill="#e8e4dc" font-size="9">PN5180</text>
      <!-- CC1101 -->
      <rect x="40" y="-100" width="80" height="60" fill="#06070a" stroke="#e8e4dc" stroke-width="0.8"/>
      <text x="80" y="-66" text-anchor="middle" fill="#e8e4dc" font-size="9">CC1101</text>
      <!-- NTAG216 -->
      <rect x="160" y="-100" width="60" height="40" fill="#06070a" stroke="#e8e4dc" stroke-width="0.8"/>
      <text x="190" y="-76" text-anchor="middle" fill="#e8e4dc" font-size="8">NTAG216</text>
      <!-- OLED -->
      <rect x="-220" y="20" width="160" height="60" fill="#06070a" stroke="#e8e4dc" stroke-width="0.8"/>
      <text x="-140" y="56" text-anchor="middle" fill="#e8e4dc" font-size="9">OLED 128×64</text>
      <!-- Battery -->
      <rect x="-40" y="20" width="180" height="80" fill="#06070a" stroke="#c9a84c" stroke-width="0.8"/>
      <text x="50" y="64" text-anchor="middle" fill="#c9a84c" font-size="9">LiPo 250 mAh</text>
      <!-- USB-C -->
      <rect x="160" y="20" width="80" height="40" fill="#06070a" stroke="#e8e4dc" stroke-width="0.8"/>
      <text x="200" y="44" text-anchor="middle" fill="#e8e4dc" font-size="8">USB-C</text>
      <!-- routing dashes -->
      <g stroke="#00e5c8" stroke-width="0.5" stroke-dasharray="2 2" fill="none" opacity="0.5">
        <path d="M -100 -60 H 0"/>
        <path d="M -100 -50 H 80"/>
      </g>
    </g>
    <text x="380" y="60" fill="#00e5c8" font-size="10" letter-spacing="3">L4 · 4-LAYER FR4 · ESP32-S3 · PN5180 · CC1101 · NTAG216</text>
    <line x1="220" y1="82" x2="380" y2="60" stroke="#00e5c8" stroke-width="0.6"/>

    <!-- Layer 2: ground plane / battery -->
    <g transform="translate(0 190) rotate(-30) skewX(-30) scale(1 0.55)">
      <rect x="-300" y="-180" width="600" height="360" rx="14" fill="#0e1014" stroke="#a9b4bf" stroke-width="0.6"/>
      <!-- crosshatch ground -->
      <g stroke="#a9b4bf" stroke-width="0.3" opacity="0.4">
        <path d="M -300 -170 L 300 -170 M -300 -150 L 300 -150 M -300 -130 L 300 -130 M -300 -110 L 300 -110 M -300 -90 L 300 -90 M -300 -70 L 300 -70 M -300 -50 L 300 -50 M -300 -30 L 300 -30 M -300 -10 L 300 -10 M -300 10 L 300 10 M -300 30 L 300 30 M -300 50 L 300 50 M -300 70 L 300 70 M -300 90 L 300 90 M -300 110 L 300 110 M -300 130 L 300 130 M -300 150 L 300 150 M -300 170 L 300 170"/>
      </g>
    </g>
    <text x="380" y="170" fill="#00e5c8" font-size="10" letter-spacing="3">L5 · GROUND PLANE + BATTERY POCKET</text>
    <line x1="220" y1="192" x2="380" y2="170" stroke="#00e5c8" stroke-width="0.6"/>

    <!-- Layer 1: bottom plate -->
    <g transform="translate(0 280) rotate(-30) skewX(-30) scale(1 0.55)">
      <rect x="-300" y="-180" width="600" height="360" rx="14" fill="url(#layer)" stroke="#e8e4dc" stroke-width="1.2"/>
      <text x="-260" y="160" fill="#a9b4bf" font-size="9" letter-spacing="3">FLLC.NET / SN 0001-A</text>
    </g>
    <text x="380" y="260" fill="#00e5c8" font-size="10" letter-spacing="3">L6 · BACK SHELL · BLACK PVD · ENGRAVED SN</text>
    <line x1="220" y1="282" x2="380" y2="260" stroke="#00e5c8" stroke-width="0.6"/>

    <!-- vertical stack guide on left -->
    <g transform="translate(-460 -240)" stroke="#00e5c8" stroke-width="0.5" fill="#00e5c8">
      <line x1="0" y1="0" x2="0" y2="540" stroke-dasharray="2 3"/>
      <text x="-130" y="0" font-size="9" letter-spacing="2">Z = 0.0 mm</text>
      <text x="-130" y="540" font-size="9" letter-spacing="2">Z = 2.6 mm</text>
      <text x="-150" y="270" font-size="9" letter-spacing="2" transform="rotate(-90 -130 270)">STACK AXIS</text>
    </g>
  </g>

  <!-- right legend column -->
  <g transform="translate(1020 130)" fill="#e8e4dc">
    <text font-size="11" letter-spacing="6" fill="#c9a84c">// MATERIAL LEGEND</text>
    <g font-size="10" letter-spacing="2" fill="#a9b4bf">
      <rect x="0" y="14" width="14" height="10" fill="url(#layer)" stroke="#e8e4dc"/>
      <text x="22" y="24">316L STAINLESS / PVD</text>
      <rect x="0" y="34" width="14" height="10" fill="#15171c" stroke="#a9b4bf"/>
      <text x="22" y="44">FERRITE 80µm</text>
      <rect x="0" y="54" width="14" height="10" fill="url(#copper)"/>
      <text x="22" y="64">35µm COPPER ETCH</text>
      <rect x="0" y="74" width="14" height="10" fill="#0a1e1a" stroke="#00e5c8"/>
      <text x="22" y="84">FR-4 / RO4350B HYBRID</text>
      <rect x="0" y="94" width="14" height="10" fill="#0e1014" stroke="#a9b4bf"/>
      <text x="22" y="104">GND PLANE / BATTERY</text>
    </g>
  </g>

  <text x="60" y="780" fill="#a9b4bf" font-size="9" letter-spacing="3">FIG. 03 — ISOMETRIC EXPLODED SLICE · ALL TX-CLASS RADIOS GATED BY HARDWARE LONG-PRESS + BACKEND ALLOW-LIST</text>
</svg>
