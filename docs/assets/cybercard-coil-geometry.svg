<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 540" role="img" aria-label="CyberCard NFC coil geometry">
  <title>CyberCard — NFC Coil Geometry</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#0a0a0c"/><stop offset="1" stop-color="#111114"/></linearGradient>
    <pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse"><path d="M24 0H0V24" fill="none" stroke="rgba(0,229,200,0.05)" stroke-width="0.5"/></pattern>
    <radialGradient id="field" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="rgba(0,229,200,0.3)"/><stop offset="1" stop-color="rgba(0,229,200,0)"/>
    </radialGradient>
  </defs>
  <rect width="1100" height="540" fill="url(#bg)"/>
  <rect width="1100" height="540" fill="url(#grid)"/>

  <g font-family="ui-monospace, Consolas, monospace" font-size="10" letter-spacing="3" fill="#6b6b72">
    <text x="40" y="38">PERSONFU // FLLC.NET</text>
    <text x="1060" y="38" text-anchor="end">CYBERCARD / COIL_GEO_v1</text>
  </g>
  <text x="40" y="76" font-family="ui-monospace, Consolas, monospace" font-size="20" letter-spacing="6" fill="#f5f5f7">NFC COIL GEOMETRY — 4-TURN RECT SPIRAL · WHEELER (MOD)</text>
  <text x="40" y="98" font-family="ui-monospace, Consolas, monospace" font-size="11" letter-spacing="3" fill="#00e5c8" opacity="0.8">L_calc ≈ 2.41 µH · C_tune ≈ 57.4 pF · f₀=13.56 MHz · Q ≈ 28 · k ≈ 0.05–0.18</text>

  <!-- Coil view -->
  <g transform="translate(80 140)">
    <rect width="520" height="340" fill="rgba(0,0,0,0.4)" stroke="rgba(0,229,200,0.25)"/>
    <!-- field clouds -->
    <ellipse cx="260" cy="170" rx="240" ry="150" fill="url(#field)"/>
    <!-- spiral -->
    <g fill="none" stroke="#00e5c8" stroke-width="2">
      <rect x="40" y="40" width="440" height="260" rx="14"/>
      <rect x="56" y="56" width="408" height="228" rx="12"/>
      <rect x="72" y="72" width="376" height="196" rx="11"/>
      <rect x="88" y="88" width="344" height="164" rx="10"/>
    </g>
    <!-- bridge -->
    <g stroke="#c9a84c" stroke-width="2" fill="none">
      <path d="M88 252 L88 320"/>
      <path d="M432 252 L432 320 L40 320"/>
    </g>
    <g fill="#c9a84c">
      <rect x="78" y="316" width="20" height="14" rx="2"/>
      <rect x="32" y="316" width="20" height="14" rx="2"/>
    </g>

    <!-- dimension lines -->
    <g stroke="#9da0a8" stroke-width="0.6" fill="none">
      <path d="M40 20 L480 20"/><path d="M40 14 L40 26"/><path d="M480 14 L480 26"/>
      <path d="M520 40 L520 300"/><path d="M514 40 L526 40"/><path d="M514 300 L526 300"/>
      <path d="M40 36 L40 84"/><path d="M34 36 L46 36"/><path d="M34 84 L46 84"/>
    </g>
    <g font-family="ui-monospace, Consolas, monospace" font-size="9" letter-spacing="2" fill="#9da0a8">
      <text x="260" y="14" text-anchor="middle">W = 60.0 mm</text>
      <text x="546" y="170" transform="rotate(90 546 170)" text-anchor="middle">H = 36.0 mm</text>
      <text x="60" y="62">s+w = 4.0 mm</text>
    </g>

    <!-- B-field markers -->
    <g font-family="ui-monospace, Consolas, monospace" font-size="9" letter-spacing="2" fill="#00e5c8">
      <circle cx="260" cy="170" r="3" fill="#00e5c8"/>
      <text x="270" y="174">B-FIELD CENTER</text>
    </g>
  </g>

  <!-- Math + params -->
  <g transform="translate(640 140)">
    <rect width="400" height="340" fill="rgba(255,255,255,0.02)" stroke="rgba(0,229,200,0.35)"/>
    <text x="20" y="28" font-family="ui-monospace, Consolas, monospace" font-size="11" letter-spacing="3" fill="#f5f5f7">DESIGN PARAMETERS</text>
    <g transform="translate(20 50)" font-family="ui-monospace, Consolas, monospace" font-size="10" letter-spacing="2" fill="#9da0a8">
      <text>N (turns)        =  4</text>
      <text y="16">w (trace)        =  0.30 mm (0.5 oz Cu)</text>
      <text y="32">s (gap)          =  0.30 mm</text>
      <text y="48">d_avg            =  46.0 mm</text>
      <text y="64">a_avg            =  20.0 mm</text>
      <text y="80">ρ (fill ratio)   =  0.46</text>
      <text y="96">f₀               =  13.56 MHz</text>
    </g>

    <line x1="20" y1="170" x2="380" y2="170" stroke="rgba(255,255,255,0.1)"/>
    <text x="20" y="190" font-family="ui-monospace, Consolas, monospace" font-size="11" letter-spacing="3" fill="#00e5c8">WHEELER (MODIFIED)</text>
    <g transform="translate(20 210)" font-family="ui-monospace, Consolas, monospace" font-size="10" letter-spacing="1" fill="#c9a84c">
      <text>L = K₁·µ₀·N²·d_avg / (1 + K₂·ρ)</text>
      <text y="18">K₁=2.34, K₂=2.75 → L ≈ 2.41 µH</text>
      <text y="36" fill="#9da0a8">C_tune = 1 / (4·π²·f₀²·L)  ≈  57.4 pF</text>
      <text y="54" fill="#9da0a8">Q = 2πf₀L / (R_dc + R_ac) ≈ 28</text>
      <text y="72" fill="#9da0a8">k(d) ≈ a²·b² / [(a²+d²)^(3/2)·(b²+d²)^(3/2)]^(1/2)</text>
      <text y="92" fill="#00e5c8">RANGE @ 200 mW, S_phone=-78 dBm: 12–35 mm</text>
    </g>
  </g>
</svg>
