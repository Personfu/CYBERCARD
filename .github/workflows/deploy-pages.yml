name: Deploy public-site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Required for the official deploy-pages action
permissions:
  contents: read
  pages: write
  id-token: write

# Only one in-flight Pages deploy
concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload static site
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public-site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
